{% extends 'base.html' %}
{% block title %}Dashboard — SymptomAI{% endblock %}
{% block content %}
<div class="hero-section">
  <div class="hero-background"></div>
  <div class="hero-overlay"></div>
  <div class="container">
    <div class="row align-items-center min-vh-50">
      <div class="col-lg-6 mb-5 mb-lg-0 hero-content">
        <h1 class="display-5 mb-4">Predict Diseases from Symptoms</h1>
        <p class="lead">Interactive symptom-based disease recognition with explainability and dynamic test recommendations powered by advanced machine learning.</p>
        <div class="d-flex flex-wrap gap-3 my-4">
          <a class="btn btn-primary btn-lg" href="/predictor">
            Try Model
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.hero-section {
  position: relative;
  overflow: hidden;
  margin: -5rem calc(-50vw + 50%) 0 calc(-50vw + 50%);
  padding: 4rem 2rem;
  width: 100vw;
}

.hero-background {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url('{{ url_for("static", filename="img/doctor-background-dcdd0zwjfb1hqf0e.jpg") }}') center/cover no-repeat;
  z-index: 0;
}

.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(ellipse at top right, rgba(59, 130, 246, 0.3) 0%, rgba(30, 58, 138, 0.5) 100%);
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 2;
  color: #ffffff;
}

.hero-content h1 {
  color: #ffffff;
  font-weight: 800;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
}

.hero-content .lead {
  color: rgba(255, 255, 255, 0.95);
  text-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
}

.min-vh-50 {
  min-height: 100vh;
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
}

@media (max-width: 768px) {
  .hero-section {
    margin: -5rem -1rem 3rem -1rem;
    padding: 3rem 1rem;
  }

  .hero-content h1 {
    font-size: 2rem;
  }
}
</style>
{% endblock %}
