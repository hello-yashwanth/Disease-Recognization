<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Symptom Predictor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="navbar-logo">
          Disease Recognition and Test Recommendation System
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/predictor">Predictor</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/about">About</a>
            </li>
            <li class="nav-item">
              {% if current_user.is_authenticated %}
              <div class="nav-user-menu">
                <button class="nav-user-btn" onclick="toggleUserMenu()">
                  <i class="fas fa-user-circle"></i> {{ current_user.username }}
                </button>
                <div id="userMenu" class="user-menu-dropdown">
                  <a href="/settings" class="dropdown-item">Settings</a>
                  <hr class="dropdown-divider">
                  <a href="/logout" class="dropdown-item text-danger">Logout</a>
                </div>
              </div>
              {% else %}
              <a class="nav-login-btn" href="/auth">Login</a>
              {% endif %}
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      {% block content %}{% endblock %}
    </main>

    <footer class="py-4 mt-5">
      <div class="container text-center small">
        © {{ current_year or 2025 }} Disease Recognition and Test Recommendation System.
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    <style>
      .navbar {
        position: relative;
        z-index: 1000 !important;
      }

      .nav-user-menu {
        position: relative;
        display: inline-block;
      }

      .nav-user-btn {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        padding: 0.5rem 1rem;
        font-size: 0.95rem;
        transition: color 0.2s ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .nav-user-btn:hover {
        color: #bfdbfe;
      }

      .user-menu-dropdown {
        position: absolute;
        top: 100%;
        right: 0;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        min-width: 200px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        display: none;
        opacity: 0;
        visibility: hidden;
        z-index: 9999;
        margin-top: 0.5rem;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      .user-menu-dropdown.show {
        display: block;
        opacity: 1;
        visibility: visible;
      }

      .dropdown-item {
        display: block;
        padding: 0.75rem 1rem;
        color: #374151;
        text-decoration: none;
        transition: background-color 0.2s ease;
        cursor: pointer;
        width: 100%;
        text-align: left;
        border: none;
        background: white;
      }

      .dropdown-item:first-child {
        border-radius: 8px 8px 0 0;
      }

      .dropdown-item:last-of-type {
        border-radius: 0 0 8px 8px;
      }

      .dropdown-item:hover {
        background-color: #f3f4f6;
        color: #1f2937;
      }

      .dropdown-item.text-danger {
        color: #dc2626;
      }

      .dropdown-item.text-danger:hover {
        background-color: #fef2f2;
      }

      .dropdown-divider {
        margin: 0.25rem 0;
        border: none;
        border-top: 1px solid #e5e7eb;
      }

      .btn-sm.btn-primary {
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
        background-color: #F02F34;
        border: none;
        color: white;
        border-radius: 6px;
        transition: background-color 0.2s ease;
      }

      .btn-sm.btn-primary:hover {
        background-color: #F02F34;
        color: white;
      }

      .btn.btn-primary {
        padding: 0.5rem 1rem;
        font-size: 0.95rem;
        background-color: #F02F34;
        border: none;
        color: white;
        border-radius: 6px;
        transition: background-color 0.2s ease;
        text-decoration: none;
      }

      .btn.btn-primary:hover {
        background-color: #F02F34;
        color: white;
        text-decoration: none;
      }

      .nav-login-btn {
        display: inline-block;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 500;
        color: white;
        background-color: #F02F34;
        border: 1px solid #F02F34;
        border-radius: 0.25rem;
        text-decoration: none;
        transition: all 0.15s ease-in-out;
        cursor: pointer;
      }

      .nav-login-btn:hover {
        background-color: #F02F34;
        border-color: #F02F34;
        color: white;
        text-decoration: none;
      }
    </style>
    
    <script>
      function toggleUserMenu() {
        const menu = document.getElementById('userMenu');
        if (menu) {
          menu.classList.toggle('show');
        }
      }

      // Close menu when clicking outside
      document.addEventListener('click', function(event) {
        const menu = document.getElementById('userMenu');
        const btn = document.querySelector('.nav-user-btn');
        if (menu && btn && !btn.contains(event.target) && !menu.contains(event.target)) {
          menu.classList.remove('show');
        }
      });
    </script>
  </body>
</html>
