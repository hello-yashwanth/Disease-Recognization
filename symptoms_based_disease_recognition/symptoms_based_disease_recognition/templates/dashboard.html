{% extends 'base.html' %}
{% block title %}Dashboard — SymptomAI{% endblock %}
{% block content %}
<div class="hero-section">
  <div class="hero-background"></div>
  <div class="hero-overlay"></div>
  <div class="container">
    <div class="row align-items-center min-vh-50">
      <div class="col-lg-6 mb-5 mb-lg-0 hero-content">
        <h1 class="display-5 mb-4">Predict Diseases from Symptoms</h1>
        <p class="lead">Interactive symptom-based disease recognition with explainability and dynamic test recommendations powered by advanced machine learning.</p>
        <div class="d-flex flex-wrap gap-3 my-4">
          <a class="btn btn-primary btn-lg" href="/predictor">
            Try Model
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.hero-section {
  position: relative;
  overflow: hidden;
  margin: -5rem calc(-50vw + 50%) 0 calc(-50vw + 50%);
  padding: 6rem 2rem;
  width: 100vw;
  min-height: 75vh;
  display: flex;
  align-items: center;
}

.hero-background {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url('{{ url_for("static", filename="img/doctor-background-dcdd0zwjfb1hqf0e.jpg") }}') center/cover no-repeat;
  z-index: 0;
  animation: backgroundZoom 20s ease-in-out infinite alternate;
}

@keyframes backgroundZoom {
  0% {
    transform: scale(1);
  }
  100% {
    transform: scale(1.05);
  }
}

.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(240, 47, 52, 0.4) 0%, rgba(30, 58, 138, 0.6) 100%);
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 2;
  color: #ffffff;
  animation: fadeInUp 1s ease;
  max-width: 700px;
}

.hero-content h1 {
  color: #ffffff;
  font-weight: 800;
  text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  margin-bottom: 1.5rem;
  line-height: 1.2;
  letter-spacing: -0.02em;
}

.hero-content .lead {
  color: rgba(255, 255, 255, 0.95);
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
  font-size: 1.35rem;
  line-height: 1.7;
  margin-bottom: 2.5rem;
}

.min-vh-50 {
  min-height: 75vh;
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: flex-start;
}

@media (max-width: 992px) {
  .hero-section {
    padding: 5rem 2rem;
    min-height: 65vh;
  }
  
  .hero-content .lead {
    font-size: 1.2rem;
  }
}

@media (max-width: 768px) {
  .hero-section {
    margin: -5rem -1rem 3rem -1rem;
    padding: 4rem 1rem;
    min-height: 60vh;
  }

  .hero-content h1 {
    font-size: 2.25rem;
  }
  
  .hero-content .lead {
    font-size: 1.1rem;
  }
  
  .min-vh-50 {
    min-height: auto;
    padding: 2rem 0;
  }
}
</style>
{% endblock %}
